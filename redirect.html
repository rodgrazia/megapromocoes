<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Redirecionando...</title>
    <meta name="robots" content="noindex,nofollow">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0c29;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #fff;
        }
        .card {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 32px 24px;
            max-width: 360px;
            width: 100%;
            text-align: center;
        }
        .spinner {
            width: 48px; height: 48px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #25D366;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        h2 { font-size: 18px; margin-bottom: 8px; }
        p { color: rgba(255,255,255,0.5); font-size: 13px; margin-bottom: 20px; }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: #fff;
            border: none;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            margin-bottom: 10px;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.7);
            font-size: 13px;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="spinner"></div>
    <h2>Redirecionando...</h2>
    <p>Se não abrir automaticamente, toque no botão abaixo</p>
    <a class="btn" href="https://chat.whatsapp.com/I56rQ4a5uJvJQIxhtdLLBj" target="_blank" rel="noopener noreferrer">
        ABRIR WHATSAPP
    </a>
    <button class="btn btn-outline" onclick="copiar()">📋 COPIAR LINK</button>
</div>

<script>
    var link = 'https://chat.whatsapp.com/I56rQ4a5uJvJQIxhtdLLBj';
    var deepLink = 'android-app://com.whatsapp/https/chat.whatsapp.com/I56rQ4a5uJvJQIxhtdLLBj';
    var u = new URL(link);
    var intent = 'intent://' + u.host + u.pathname + '#Intent;scheme=https;S.browser_fallback_url=' + encodeURIComponent(link) + ';end';

    function copiar() {
        navigator.clipboard.writeText(link);
        var btn = event.target;
        btn.textContent = '✅ COPIADO!';
        setTimeout(function() { btn.textContent = '📋 COPIAR LINK'; }, 2000);
        window.location.href = 'whatsapp://send?text=Quero%20entrar%20no%20grupo';
    }

    function tentar(url) {
        var a = document.createElement('a');
        a.href = url;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }

    navigator.clipboard.writeText(link);

    tentar(deepLink);
    setTimeout(function() { tentar(intent); }, 100);
    setTimeout(function() { tentar(link); }, 200);
    setTimeout(function() { window.location.href = deepLink; }, 300);
    setTimeout(function() { window.location.href = intent; }, 400);
    setTimeout(function() { window.location.href = link; }, 500);
</script>
</body>
</html>
